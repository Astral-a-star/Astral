        </div>
        
        <!-- Service 2 -->
        <div class="service-card">
          <div class="gallery-item">
            <img src="../assets/img/work2.jpg" alt="Before and After">
          </div>  
        </div>

        <!-- Service 3 -->
        <div class="service-card">
          <div class="gallery-item">
            <img src="../assets/img/work3.jpg" alt="Before and After">
          </div>   
        </div>
           
    </div>
    <!-- Repeat for other services -->
  </section>

  <!-- LONG HAIR Gallery Section -->
  <main>
    <section id="long-hair">
      <h2>Long Hairstyles</h2>
      <div class="category">      
        <!-- Image Cards Carousel -->
        <div class="image-carousel">
          <div class="image-wrapper">
            <img src="../assets/img/long1.jpg" alt="Long Hair Style 1">
            <img src="../assets/img/long2.jpg" alt="Long Hair Style 2">
            <img src="../assets/img/long3.jpg" alt="Long Hair Style 3">
            <img src="../assets/img/long4.jpg" alt="Long Hair Style 4">
            <img src="../assets/img/long5.jpg" alt="Long Hair Style 5">
            <img src="../assets/img/long11.jpg" alt="Style 1">
            <img src="../assets/img/long12.jpg" alt="Style 2">
            <img src="../assets/img/long13.jpg" alt="Style 3">
            <img src="../assets/img/long8.jpg" alt="Style 4">
            <img src="../assets/img/long15.jpg" alt="Style 5">
          </div>
        </div>
      </div>
    </section>

    <!-- Modal for Enlarged Image -->
    <div id="image-modal" class="modal">
      <span class="close-btn">&times;</span>
      <img class="modal-content" id="modal-image">
    </div>
  </main>

  <footer>
