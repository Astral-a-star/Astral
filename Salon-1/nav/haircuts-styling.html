<body>
  <!-- Navigation Bar -->
  <header>
    <nav>
      <ul class="nav-links">
        <li><a href="../index.html">Home</a></li>

  <!-- Image Carousel -->
  <section id="image-carousel">
    <div class="carousel">
      <img src="../assets/img/long11.jpg" alt="Style 1">
      <img src="../assets/img/long2.jpg" alt="Style 2">
      <img src="../assets/img/long13.jpg" alt="Style 3">
      <img src="../assets/img/long8.jpg" alt="Style 4">
      <img src="../assets/img/long15.jpg" alt="Style 5">
    </div>

  <!-- Long Hair Section -->
  <section id="long-hair">
    <h2>Long Hair</h2>
    <div class="category">
      <!-- Pricing Card -->
      <div class="pricing-card">
        <h3>Pricing</h3>
        <p>Wash & Cut: $50</p>
        <p>Blow Dry: $30</p>

      <!-- Image Cards Carousel -->
      <div class="image-carousel">
        <div class="image-wrapper">
          <img src="../assets/img/long1.jpg" alt="Long Hair Style 1">
          <img src="../assets/img/long2.jpg" alt="Long Hair Style 2">
          <img src="../assets/img/long3.jpg" alt="Long Hair Style 3">
          <img src="../assets/img/long4.jpg" alt="Long Hair Style 4">

        <button class="carousel-btn prev-btn">‹</button>
        <button class="carousel-btn next-btn">›</button>
      </div>
    </div>
  </section>

  <!-- Short Hair Section -->
  <section id="short-hair">
    <h2>Short Hair</h2>
    <div class="category">
      <!-- Pricing Card -->
      <div class="pricing-card">
        <h3>Pricing</h3>
        <p>Wash & Cut: $40</p>
        <p>Blow Dry: $20</p>
        <p>Styling: $30</p>
      </div>
      <!-- Image Cards Carousel -->
      <div class="image-carousel">
        <div class="image-wrapper">
          <img src="../assets/img/short1.jpg" alt="Short Hair Style 1">
          <img src="../assets/img/short2.jpg" alt="Short Hair Style 2">

        <button class="carousel-btn next-btn">›</button>
